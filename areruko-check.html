/* ===== APP ===== */
function App() {
  const [screen, setScreen] = useState("top");
  const [currentTypeIdx, setCurrentTypeIdx] = useState(0);
  const [answers, setAnswers] = useState(TYPES.map(t => new Array(t.questions.length).fill(false)));
  const [detailType, setDetailType] = useState(null);

  const scores = TYPES.map((t, i) => answers[i].filter(Boolean).length);
  const maxScore = Math.max(...scores, 1);
  const sortedTypes = [...TYPES].map((t, i) => ({ ...t, score: scores[i] })).sort((a, b) => b.score - a.score);

  function toggleAnswer(typeIdx, qIdx) {
    setAnswers(prev => { const n = prev.map(a => [...a]); n[typeIdx][qIdx] = !n[typeIdx][qIdx]; return n; });
  }

  function handleNext() {
    if (currentTypeIdx < TYPES.length - 1) { setCurrentTypeIdx(i => i + 1); window.scrollTo(0, 0); }
    else { setScreen("result"); window.scrollTo(0, 0); }
  }

  function handleRetry() {
    setAnswers(TYPES.map(t => new Array(t.questions.length).fill(false)));
    setCurrentTypeIdx(0);
    setScreen("top");
    window.scrollTo(0, 0);
  }

  function openDetail(type) { setDetailType(type); setScreen("detail"); window.scrollTo(0, 0); }
  function backToResult() { setScreen("result"); window.scrollTo(0, 0); }

  if (screen === "top") return <TopScreen onStart={() => { setScreen("quiz"); window.scrollTo(0, 0); }} />;

  if (screen === "quiz") {
    const type = TYPES[currentTypeIdx];
    const typeAnswers = answers[currentTypeIdx];
    const checkedCount = typeAnswers.filter(Boolean).length;
    const progress = ((currentTypeIdx + 1) / TYPES.length) * 100;
    return (
      <div className="screen" style={{ "--type-color": type.color, "--type-light": type.light }}>
        <div className="q-header" style={{ background: type.color }}>
          <div className="q-type-badge">{type.no} {currentTypeIdx + 1} / {TYPES.length}</div>
          <div className="q-type-name">{type.name}</div>
          <div className="q-type-sub">「{type.sub}」タイプ</div>
          <div className="progress-bar-wrap">
            <div className="progress-bar-fill" style={{ width: progress + "%" }} />
          </div>
        </div>
        <div className="q-list">
          {type.questions.map((q, i) => (
            <div key={i} className={"q-item" + (typeAnswers[i] ? " checked" : "")}
              onClick={() => toggleAnswer(currentTypeIdx, i)}>
              <div className="q-checkbox"><span className="check-icon">✓</span></div>
              <div className="q-text">{q}</div>
            </div>
          ))}
        </div>
        <div className="q-footer">
          <div className="q-count-label"><span>{checkedCount}</span> / {type.questions.length} 項目チェック</div>
          <button className="btn-next" onClick={handleNext}>
            {currentTypeIdx < TYPES.length - 1 ? "次のタイプへ →" : "結果を見る ✨"}
          </button>
        </div>
      </div>
    );
  }

  if (screen === "result") {
    const totalChecked = scores.reduce((a, b) => a + b, 0);
    return (
      <ResultScreen
        sortedTypes={sortedTypes}
        maxScore={maxScore}
        totalChecked={totalChecked}
        onDetail={openDetail}
        onRetry={handleRetry}
      />
    );
  }

  if (screen === "detail") {
    const typeIdx = TYPES.findIndex(t => t.id === detailType.id);
    const checkedQs = detailType.questions.filter((_, i) => answers[typeIdx][i]);
    return <DetailScreen type={detailType} checkedQuestions={checkedQs} onBack={backToResult} />;
  }

  return null;
}

/* ===== TOP SCREEN ===== */
function TopScreen({ onStart }) {
  return (
    <div className="screen top-screen">
      <div className="top-illust-wrap">
        <TantrumIllust />
      </div>
      <div className="top-text-area">
        <div className="top-title">外ではいい子なのに<br />家で荒れる子</div>
        <div className="top-subtitle">タイプ別チェックリスト＆対処まとめ</div>
        <div className="time-badge">
          <span>⏱</span> 診断目安時間：約3分　7タイプ・84問
        </div>
        <div className="top-notice">
          ⚠️ これは医療診断ではなく、子どもの状態を整理するための簡易チェックです。多くの子は「複合型」です。当てはまる数が多いタイプほど、傾向が強い可能性があります。
        </div>
        <button className="btn-primary" onClick={onStart}>診断スタート</button>
      </div>
    </div>
  );
}

/* ===== RESULT SCREEN ===== */
function ResultScreen({ sortedTypes, maxScore, totalChecked, onDetail, onRetry }) {
  const COMBOS = [
    { types: [1, 2], label: "①過剰適応 × ②安全基地", desc: "外でのストレスを、安心できる親に向けて解放しているパターンです。" },
    { types: [1, 5], label: "①過剰適応 × ⑤発達特性", desc: "特性により社会適応に大きなエネルギーを使い、家で崩れやすいパターンです。" },
    { types: [3, 7], label: "③感情調整未熟 × ⑦身体状態", desc: "身体の疲れや空腹が感情コントロールを更に難しくしているパターンです。" },
    { types: [4, 6], label: "④愛着不安 × ⑥家庭内相互作用", desc: "愛着確認の試し行動に親が強く反応することで、ループが固定化しているパターンです。" },
  ];
  const topScoreIds = sortedTypes.slice(0, 2).filter(t => t.score > 0).map(t => t.id);
  const matchedCombos = COMBOS.filter(c => c.types.every(id => topScoreIds.includes(id)));

  return (
    <div className="screen result-screen" style={{ padding: "0 0 80px" }}>
      <div className="result-header">
        <h2>診断結果</h2>
        <p>チェックした項目: 合計 {totalChecked} 項目</p>
      </div>
      <div style={{ padding: "20px 16px 0" }}>
        {sortedTypes.map((type, rank) => {
          const pct = (type.score / 12) * 100;
          const isTop = rank === 0 && type.score > 0;
          const isZero = type.score === 0;
          return (
            <div key={type.id}
              className={"result-card" + (isTop ? " top-card" : "") + (isZero ? " result-zero" : "")}
              style={{ "--type-color": type.color, "--type-light": type.light }}
              onClick={() => !isZero && onDetail(type)}>
              <div className="result-card-header">
                <div className={"result-rank" + (isTop ? " rank-1" : "")}>{isTop ? "★" : rank + 1}</div>
                <div className="result-type-info">
                  <div className="result-type-name">{type.emoji} {type.name}</div>
                  <div className="result-type-sub">「{type.sub}」</div>
                </div>
                <div className="result-score">{type.score}<span>/12</span></div>
              </div>
              <div className="result-bar-wrap">
                <div className="result-bar-fill" style={{ width: pct + "%" }} />
              </div>
              {!isZero && <div className="result-tap-hint"><span>▶</span> タップして対応方法を見る</div>}
            </div>
          );
        })}

        {matchedCombos.length > 0 && (
          <div className="combo-section">
            <div className="combo-title">🔗 複合タイプの可能性</div>
            {matchedCombos.map((c, i) => (
              <div key={i} className="combo-item"><strong>{c.label}</strong><br />{c.desc}</div>
            ))}
          </div>
        )}

        <div className="final-message">
          「荒れる」は、<br />
          <strong>"困らせたい"</strong>ではなく、<br />
          <strong>"困っている"</strong>サインのことが多くあります。<br /><br />
          「どう止めるか」だけでなく、<br />
          <em>何が背景にあるのか</em> を見つけることが大切です。
        </div>

        <button className="btn-retry" onClick={onRetry}>もう一度診断する</button>
      </div>
    </div>
  );
}

/* ===== DETAIL SCREEN ===== */
function DetailScreen({ type, checkedQuestions, onBack }) {
  return (
    <div className="screen" style={{ "--type-color": type.color, "--type-light": type.light }}>
      <div className="detail-header" style={{ background: type.color }}>
        <button className="btn-back" onClick={onBack}>← 結果に戻る</button>
        <div className="detail-type-no">{type.no}</div>
        <div className="detail-type-name">{type.emoji} {type.name}</div>
        <div className="detail-type-sub">「{type.sub}」タイプ</div>
        <div className="detail-score-badge">チェック数: {type.score} / 12項目</div>
      </div>
      <div className="detail-content">
        <div className="detail-summary">{type.summary}</div>

        {checkedQuestions.length > 0 && (
          <div className="checked-questions">
            <div className="detail-section-title">✓ チェックした項目</div>
            {checkedQuestions.map((q, i) => <div key={i} className="checked-q-item">✓ {q}</div>)}
          </div>
        )}

        <div className="detail-section-title">🔑 キーワード</div>
        <div className="keyword-badge">「{type.keyword}」</div>

        <div className="detail-section-title">✅ 有効な対応</div>
        <div className="action-list">
          {type.actions.map((a, i) => (
            <div key={i} className="action-item">
              <div className="action-dot" />
              <div className="action-text">{a}</div>
            </div>
          ))}
        </div>

        <div className="ng-section">
          <div className="ng-title">⛔ NGな対応</div>
          {type.ng.map((n, i) => (
            <div key={i} className="ng-item"><span className="ng-cross">✕</span>{n}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
